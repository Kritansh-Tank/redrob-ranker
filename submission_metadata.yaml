ai_usage_summary: |
  Used Claude (Antigravity AI assistant) for architecture discussion, 
  scoring component design, and code review. All scoring logic, 
  skill keyword curation, and JD analysis was done with human oversight 
  and engineering judgment. No candidate data was fed to any external LLM 
  during the ranking step — ranking is fully deterministic and offline.

methodology_summary: |
  Rule-based multi-signal ranker with explicit scoring components.
  Five weighted components: (1) Tier-based AI/ML skill matching (35%) 
  using proficiency, endorsements, and usage duration as quality signals; 
  (2) Title/headline/summary keyword scoring (20%); (3) Career depth 
  scoring with YoE fit curve, startup experience, and production ML signals 
  in role descriptions (15%); (4) Education tier and field relevance (5%); 
  (5) India location fit (5%). A behavioral engagement multiplier (0.1–1.15x) 
  derived from 10+ platform signals (recency, open-to-work, recruiter 
  response rate, GitHub activity, notice period, salary fit) is applied 
  multiplicatively to the base score. Honeypot detection uses 10 checks 
  for impossible profile patterns. Runtime ~90s for 100K candidates on CPU.

declarations:
  read_submission_spec: true
  code_is_original_work: true
  no_collusion: true
  honeypot_check_done: true
  reproduction_tested: true
